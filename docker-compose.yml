services:
  # NodeJS Service
  app-assurmoi-node:
    container_name: "app-assurmoi-API-nodejs"
    build:
      context: ./
      dockerfile: Dockerfile
    command: 'npm run dev'
    depends_on:
       - 'app-assurmoi-db'
       - 'app-assurmoi-mailhog'
    environment:
      - NODE_ENV=development
    volumes:
      - './:/home/app:rw'
    ports:
      - "3000:3000"
    networks:
      - default
    expose:
      - "3000"
    working_dir: '/home/app'
  # SMTP server
  app-assurmoi-mailhog:
    image: mailhog/mailhog
    ports: 
      - 1025:1025 # smtp server
      - 8025:8025 # web ui
  # database
  app-assurmoi-db:
    image: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: assurmoidb
    volumes:
      - './db-data:/var/lib/mysql:rw'
    ports:
      - 3306:3306
  # Database client
  app-assurmoi-adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
  # React Native (Expo) — Metro : http://localhost:8081
  # Inclus par défaut dans `docker compose up` (toute la stack : API + DB + mails + Adminer + mobile).
  # Sans ce service : voir package.json (script docker:up:api) ou lister les services explicitement.
  # Doc : https://reactnative.dev/docs/environment-setup
  app-assurmoi-mobile:
    container_name: "app-assurmoi-mobile"
    build:
      context: ./APP-ASSURMOI-MOBILE
      dockerfile: Dockerfile
    command: "npm run start:docker"
    depends_on:
      - app-assurmoi-node
    environment:
      - NODE_ENV=development
    ports:
      - "8081:8081"
    volumes:
      - "./APP-ASSURMOI-MOBILE:/home/app:rw"
    working_dir: "/home/app"
    networks:
      - default
    stdin_open: true
    tty: true