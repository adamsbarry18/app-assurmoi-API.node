openapi: 3.0.3
info:
  title: AssurMoi API
  description: |
    API REST — Gestion des sinistres assurance.
    Les erreurs renvoient `{ message, code }` ; la validation peut inclure `errors` ou `details`.
  version: 1.0.0

servers:
  - url: /
    description: Serveur courant (même origine que cette doc)

tags:
  - name: Système
  - name: Authentification
  - name: Utilisateurs

paths:
  /api/auth/login:
    post:
      tags: [Authentification]
      summary: Connexion (access + refresh JWT)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  description: Adresse email ou nom d’utilisateur
                password: { type: string }
      responses:
        '200':
          description: Bearer access token + refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/refresh:
    post:
      tags: [Authentification]
      summary: Rafraîchir les tokens
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      tags: [Authentification]
      summary: Déconnexion (révoque le refresh côté serveur)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Pas de corps
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/me:
    get:
      tags: [Authentification]
      summary: Profil courant
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/forgot-password:
    post:
      tags: [Authentification]
      summary: Demande de réinitialisation (email)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Message générique (anti-énumération)

  /api/auth/reset-password:
    post:
      tags: [Authentification]
      summary: Nouveau mot de passe (token reçu par email)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: OK

  /api/auth/invite:
    post:
      tags: [Authentification]
      summary: Envoyer une invitation (ADMIN)
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Invitation envoyée
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/auth/complete-invite:
    post:
      tags: [Authentification]
      summary: Finaliser l’inscription via lien d’invitation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [token, username, password]
              properties:
                token: { type: string }
                username: { type: string }
                password: { type: string, minLength: 8 }
                first_name: { type: string }
                last_name: { type: string }
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /:
    get:
      tags: [Système]
      summary: Accueil
      operationId: getRoot
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  docs: { type: string }

  /api/users:
    get:
      tags: [Utilisateurs]
      summary: Liste des utilisateurs
      security:
        - bearerAuth: []
      operationId: listUsers
      parameters:
        - name: search
          in: query
          schema: { type: string, maxLength: 255 }
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: is_active
          in: query
          description: Chaînes `"true"` ou `"false"`
          schema: { type: string, enum: ['true', 'false'] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Liste paginée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Utilisateurs]
      summary: Créer un utilisateur
      security:
        - bearerAuth: []
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/users/{id}:
    get:
      tags: [Utilisateurs]
      summary: Détail utilisateur
      security:
        - bearerAuth: []
      operationId: getUserById
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      tags: [Utilisateurs]
      summary: Mettre à jour un utilisateur
      security:
        - bearerAuth: []
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '400':
          description: Validation ou aucun champ à mettre à jour
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorBody'
                  - $ref: '#/components/schemas/ErrorMessage'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Utilisateurs]
      summary: Supprimer définitivement un utilisateur
      security:
        - bearerAuth: []
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  status: { type: integer, description: Lignes supprimées }
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/users/{id}/deactivate:
    patch:
      tags: [Utilisateurs]
      summary: Désactiver un utilisateur
      security:
        - bearerAuth: []
      operationId: deactivateUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDeactivateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    UserRole:
      type: string
      enum:
        - ADMIN
        - PORTFOLIO_MANAGER
        - TRACKING_OFFICER
        - CUSTOMER_OFFICER
        - INSURED

    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        email: { type: string, format: email }
        first_name: { type: string, nullable: true }
        last_name: { type: string, nullable: true }
        role:
          $ref: '#/components/schemas/UserRole'
        is_active: { type: boolean }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    UserCreate:
      type: object
      required: [username, email, password, role]
      properties:
        username: { type: string, maxLength: 255 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        role:
          $ref: '#/components/schemas/UserRole'
        first_name: { type: string }
        last_name: { type: string }
        is_active: { type: boolean }

    UserUpdate:
      type: object
      minProperties: 1
      properties:
        username: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        role:
          $ref: '#/components/schemas/UserRole'
        first_name: { type: string }
        last_name: { type: string }
        is_active: { type: boolean }

    ListMeta:
      type: object
      properties:
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          $ref: '#/components/schemas/ListMeta'

    UserSingleResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'

    UserDeactivateResponse:
      type: object
      properties:
        message: { type: string }
        data:
          $ref: '#/components/schemas/User'

    LoginResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        tokenType: { type: string, example: Bearer }
        expiresIn: { type: integer, description: Durée de vie de l’access token (secondes) }
        user:
          $ref: '#/components/schemas/User'

    TokenPair:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        tokenType: { type: string }
        expiresIn: { type: integer }

    ErrorMessage:
      type: object
      properties:
        message: { type: string }
        code: { type: string }
      required: [message, code]

    ValidationErrorBody:
      type: object
      properties:
        message: { type: string }
        code: { type: string, example: VALIDATION_ERROR }
        errors:
          type: array
          items: { type: object }

    SequelizeValidationBody:
      type: object
      properties:
        message: { type: string }
        code: { type: string }
        details:
          type: array
          items: { type: string }

  responses:
    ValidationError:
      description: Paramètres ou corps invalides
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ValidationErrorBody'
              - $ref: '#/components/schemas/SequelizeValidationBody'

    NotFound:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'

    InternalError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'

    Unauthorized:
      description: Non authentifié
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'

    Forbidden:
      description: Droits insuffisants
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
