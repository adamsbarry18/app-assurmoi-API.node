openapi: 3.0.3
info:
  title: AssurMoi API
  description: |
    API REST — Gestion des sinistres assurance.
    Les erreurs renvoient `{ message, code }` ; la validation peut inclure `errors` ou `details`.
  version: 1.0.0

servers:
  - url: /
    description: Serveur courant (même origine que cette doc)

tags:
  - name: Système
  - name: Authentification
  - name: Utilisateurs
  - name: Sinistres
    description: Déclarations et dossiers sinistre (liens documents CNI, carte grise, attestation)
  - name: Documents
    description: Upload, consultation et validation des pièces jointes
  - name: Dossiers
    description: Dossiers de prise en charge (sinister_folders, étapes)
  - name: Historisation
    description: Journal des actions (history_logs)
  - name: Notifications
    description: Notifications in-app (PUSH interne) — pas d’envoi email automatique dans cette version

paths:
  /api/auth/login:
    post:
      tags: [Authentification]
      summary: Connexion (access + refresh JWT)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  description: Adresse email ou nom d’utilisateur
                password: { type: string }
      responses:
        '200':
          description: Bearer access token + refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/refresh:
    post:
      tags: [Authentification]
      summary: Rafraîchir les tokens
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      tags: [Authentification]
      summary: Déconnexion (révoque le refresh côté serveur)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Pas de corps
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/me:
    get:
      tags: [Authentification]
      summary: Profil courant
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/forgot-password:
    post:
      tags: [Authentification]
      summary: Demande de réinitialisation (email)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Message générique (anti-énumération)

  /api/auth/reset-password:
    post:
      tags: [Authentification]
      summary: Nouveau mot de passe (token reçu par email)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: OK

  /api/auth/invite:
    post:
      tags: [Authentification]
      summary: Envoyer une invitation
      description: |
        Rôles : **ADMIN**, **PORTFOLIO_MANAGER**, **CUSTOMER_OFFICER**.

        Le rôle cible (`role` dans le corps) peut être **n’importe lequel** des rôles applicatifs
        (y compris assuré) : l’invité finalise via `GET …/invite?token=…` et `POST /api/auth/complete-invite`.

        Pour une **fiche assuré** liée à un contrat sans parcours « invitation libre »,
        préférer `POST /api/users/insured-provision` (profil renseigné + e-mail mot de passe).
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Invitation envoyée
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/auth/complete-invite:
    post:
      tags: [Authentification]
      summary: Finaliser l’inscription via lien d’invitation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [token, username, password]
              properties:
                token: { type: string }
                username: { type: string }
                password: { type: string, minLength: 8 }
                first_name: { type: string }
                last_name: { type: string }
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /:
    get:
      tags: [Système]
      summary: Accueil
      operationId: getRoot
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  docs: { type: string }
                  auth: { type: string }
                  users: { type: string }
                  sinisters: { type: string }
                  documents: { type: string }
                  folders: { type: string }
                  history: { type: string }
                  notifications: { type: string }

  /api/users:
    get:
      tags: [Utilisateurs]
      summary: Liste des utilisateurs
      description: |
        Rôles : **ADMIN**, **PORTFOLIO_MANAGER**, **CHARGé_DE_CLIENTELE** (CUSTOMER_OFFICER) — annuaire
        opérationnel (invitations, fiches assurés). La création / désactivation / suppression reste
        réservée à l’admin sur les routes dédiées.

        Filtrage par liste : `user_scope=insured` (assurés uniquement) ou `user_scope=staff`
        (ADMIN, gestionnaires, chargés de suivi et de clientèle — hors assurés). Si ce paramètre est
        défini, il prime sur `role` pour le périmètre.
      security:
        - bearerAuth: []
      operationId: listUsers
      parameters:
        - name: search
          in: query
          schema: { type: string, maxLength: 255 }
        - name: user_scope
          in: query
          description: Liste assurés ou liste équipe (gestionnaires)
          schema:
            type: string
            enum: [insured, staff]
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: is_active
          in: query
          description: Chaînes `"true"` ou `"false"`
          schema: { type: string, enum: ['true', 'false'] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Liste paginée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Utilisateurs]
      summary: Créer un utilisateur
      description: Réservé au rôle **ADMIN** (compte complet avec mot de passe).
      security:
        - bearerAuth: []
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/users/insured-provision:
    post:
      tags: [Utilisateurs]
      summary: Créer un compte assuré (profil + option e-mail premier accès)
      description: |
        Rôles : ADMIN, PORTFOLIO_MANAGER, CUSTOMER_OFFICER.

        Crée un utilisateur **INSURED** avec identité renseignée ; le mot de passe provisoire est aléatoire.
        **E-mail** : si `send_welcome_email` vaut `true`, un message part avec le lien de définition
        de mot de passe (même flux que la réinitialisation). Par défaut (`false` ou omis) **aucun**
        e-mail n’est envoyé : utilisez `POST /api/users/{id}/resend-welcome` lorsque l’assuré doit
        accéder à l’espace.

        Tant que le mot de passe n’est pas défini, `password_pending` est `true` et la connexion par mot de passe est refusée (message explicite).
      security:
        - bearerAuth: []
      operationId: provisionInsuredUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInsuredProvision'
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/users/{id}/resend-welcome:
    post:
      tags: [Utilisateurs]
      summary: Renvoyer l’e-mail de premier accès (assuré)
      description: |
        Rôles : **ADMIN**, **PORTFOLIO_MANAGER**, **CUSTOMER_OFFICER**.
        Uniquement si le compte est **INSURED** et `password_pending` est true.
      security:
        - bearerAuth: []
      operationId: resendInsuredWelcome
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/users/insured-options:
    get:
      tags: [Utilisateurs]
      summary: Assurés actifs (sélecteur, rattachement sinistre)
      description: >
        Réservé à ADMIN, PORTFOLIO_MANAGER, CUSTOMER_OFFICER.
        Liste courte de comptes au rôle INSURED actifs (champs publics), pour formulaires métiers.
      security:
        - bearerAuth: []
      operationId: listInsuredOptions
      parameters:
        - name: search
          in: query
          schema: { type: string, maxLength: 255 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
      responses:
        '200':
          description: Tableau d’utilisateurs (assurés)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsuredOptionsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/users/tracking-officer-options:
    get:
      tags: [Utilisateurs]
      summary: Chargés de suivi / admins (affectation dossier)
      description: >
        Réservé à ADMIN, PORTFOLIO_MANAGER. Comptes actifs au rôle TRACKING_OFFICER ou ADMIN
        (rattachement possible à un dossier).
      security:
        - bearerAuth: []
      operationId: listTrackingOfficerOptions
      parameters:
        - name: search
          in: query
          schema: { type: string, maxLength: 255 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
      responses:
        '200':
          description: Tableau d’utilisateurs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsuredOptionsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/users/{id}:
    get:
      tags: [Utilisateurs]
      summary: Détail utilisateur
      description: |
        Consultation autorisée pour **soi-même**, ou pour **ADMIN / Gestionnaire / Chargé de clientèle**
        (même périmètre que l’annuaire `GET /api/users`).
      security:
        - bearerAuth: []
      operationId: getUserById
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      tags: [Utilisateurs]
      summary: Mettre à jour un utilisateur
      security:
        - bearerAuth: []
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '400':
          description: Validation ou aucun champ à mettre à jour
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorBody'
                  - $ref: '#/components/schemas/ErrorMessage'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Utilisateurs]
      summary: Supprimer définitivement un utilisateur
      security:
        - bearerAuth: []
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  status: { type: integer, description: Lignes supprimées }
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/users/{id}/deactivate:
    patch:
      tags: [Utilisateurs]
      summary: Désactiver un utilisateur
      security:
        - bearerAuth: []
      operationId: deactivateUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDeactivateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/sinisters:
    get:
      tags: [Sinistres]
      summary: Lister les sinistres
      description: |
        Rôles autorisés : ADMIN, PORTFOLIO_MANAGER, TRACKING_OFFICER, CUSTOMER_OFFICER, INSURED.
        **Assuré (INSURED)** : uniquement les sinistres où `insured_user_id` correspond à l’utilisateur connecté.
        Filtre `status` : `pending_validation`, `validated`, ou statut dossier (`INITIALIZED`, … `CLOSED`).
      security:
        - bearerAuth: []
      operationId: listSinisters
      parameters:
        - name: vehicle_plate
          in: query
          description: Filtre partiel sur l’immatriculation
          schema: { type: string, maxLength: 50 }
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SinisterListStatusFilter'
        - name: call_datetime_from
          in: query
          schema: { type: string, format: date-time }
        - name: call_datetime_to
          in: query
          schema: { type: string, format: date-time }
        - name: incident_datetime_from
          in: query
          schema: { type: string, format: date-time }
        - name: incident_datetime_to
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Liste paginée ; chaque élément inclut un champ calculé `status`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SinisterListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Sinistres]
      summary: Créer un sinistre
      description: |
        Rôles : CUSTOMER_OFFICER, PORTFOLIO_MANAGER, ADMIN, **INSURED** (déclaration assuré).

        **Assuré** : `insured_user_id` est ignoré ; le sinistre est rattaché au compte connecté.
        Collègues : peuvent renseigner `insured_user_id` (compte assuré actif ayant défini son mot de passe).

        Les IDs de pièces (`cni_driver`, etc.) doivent référencer des documents du type attendu (CNI → ID_CARD, …).
        Toute création reste soumise à **validation gestionnaire** (`is_validated_by_manager`).
      security:
        - bearerAuth: []
      operationId: createSinister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SinisterCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SinisterSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/sinisters/{id}:
    get:
      tags: [Sinistres]
      summary: Détail d’un sinistre
      description: |
        L’assuré (INSURED) n’accède qu’aux sinistres qui lui sont rattachés (`insured_user_id`).
      security:
        - bearerAuth: []
      operationId: getSinisterById
      parameters:
        - $ref: '#/components/parameters/SinisterId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SinisterSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      tags: [Sinistres]
      summary: Mettre à jour un sinistre
      description: Interdit si le sinistre a déjà été validé par un gestionnaire (`422`).
      security:
        - bearerAuth: []
      operationId: updateSinister
      parameters:
        - $ref: '#/components/parameters/SinisterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SinisterUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SinisterSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/sinisters/{id}/validate:
    patch:
      tags: [Sinistres]
      summary: Valider le sinistre (gestionnaire / admin)
      description: |
        Rôles : PORTFOLIO_MANAGER, ADMIN.
        Si le dossier est complet (3 pièces liées, toutes validées, champs obligatoires renseignés),
        crée automatiquement une ligne `sinister_folders` avec statut `INITIALIZED`.
      security:
        - bearerAuth: []
      operationId: validateSinister
      parameters:
        - $ref: '#/components/parameters/SinisterId'
      responses:
        '200':
          description: Corps inclut `message`, `data`, `meta` (création dossier, complétude)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SinisterValidateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/documents:
    post:
      tags: [Documents]
      summary: Uploader un document
      description: |
        Rôles : ADMIN, PORTFOLIO_MANAGER, CUSTOMER_OFFICER, TRACKING_OFFICER, INSURED.
        **Assuré** : seul le type `RIB` est autorisé.
        Corps `multipart/form-data` : champ fichier `file`, champ texte `type` (enum).
        Taille max configurable (`UPLOAD_MAX_BYTES`, défaut 15 Mo). Types MIME autorisés : PDF, PNG, JPEG, GIF, WebP, texte brut.
      security:
        - bearerAuth: []
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, type]
              properties:
                file:
                  type: string
                  format: binary
                  description: Fichier à stocker
                type:
                  $ref: '#/components/schemas/DocumentType'
      responses:
        '201':
          description: Identifiant et URL d’accès au document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUploadResponse'
        '400':
          description: Fichier manquant, type non autorisé ou trop volumineux
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/documents/{id}:
    get:
      tags: [Documents]
      summary: Consulter ou télécharger un document
      description: |
        Rôles : ADMIN, PORTFOLIO_MANAGER, TRACKING_OFFICER, CUSTOMER_OFFICER.
        Par défaut : flux binaire du fichier (`Content-Disposition` inline).
        `?meta=1` : réponse JSON (métadonnées + `storage_url`).
        `?disposition=attachment` : pièce jointe.
      security:
        - bearerAuth: []
      operationId: getDocumentById
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - name: meta
          in: query
          description: Si `1` ou `true`, retourne du JSON au lieu du fichier
          schema: { type: string, enum: ['1', 'true'] }
        - name: disposition
          in: query
          schema: { type: string, enum: [inline, attachment] }
      responses:
        '200':
          description: Fichier binaire ou métadonnées JSON
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DocumentMeta'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/documents/{id}/validate:
    patch:
      tags: [Documents]
      summary: Valider un document (gestionnaire / admin)
      description: |
        Rôles : PORTFOLIO_MANAGER, ADMIN. Passe `is_validated` à `true`.
      security:
        - bearerAuth: []
      operationId: validateDocument
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentValidateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/documents/{id}/sign:
    post:
      tags: [Documents]
      summary: Lancer une demande de signature Yousign
      description: |
        Rôles : ADMIN, PORTFOLIO_MANAGER.

        Le document doit exister, être **validé** en interne (`PATCH …/validate`) et le fichier doit être présent sur le serveur.
        Formats acceptés pour l’envoi à Yousign : **PDF** ou **DOCX**.

        Configurez `YOUSIGN_API_KEY` et éventuellement `YOUSIGN_BASE_URL` (sandbox vs production).
        Voir [API Yousign](https://yousign.com/fr-fr/api).
      security:
        - bearerAuth: []
      operationId: signDocumentYousign
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentSignRequest'
      responses:
        '200':
          description: Demande Yousign créée et activée (lien de signature si renvoyé par l’API)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentSignResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Document non validé ou format non signable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          $ref: '#/components/responses/InternalError'
        '502':
          description: Erreur ou réponse invalide côté Yousign
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /api/folders:
    get:
      tags: [Dossiers]
      summary: Lister les dossiers de prise en charge
      description: |
        Rôles : ADMIN, PORTFOLIO_MANAGER, TRACKING_OFFICER, CUSTOMER_OFFICER, INSURED.
        **Assuré** : uniquement les dossiers dont le sinistre a `insured_user_id` = utilisateur courant.
      security:
        - bearerAuth: []
      operationId: listFolders
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/FolderStatus'
        - name: scenario
          in: query
          schema:
            $ref: '#/components/schemas/FolderScenario'
        - name: assigned_officer_id
          in: query
          schema: { type: integer, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Dossiers]
      summary: Créer manuellement un dossier pour un sinistre
      description: |
        Rôles : ADMIN, PORTFOLIO_MANAGER, CUSTOMER_OFFICER.
        Le sinistre doit être validé par un gestionnaire. Si le dossier est incomplet (pièces),
        les rôles gestionnaire/admin peuvent passer `force: true`.
        Retourne 409 si un dossier existe déjà pour ce sinistre.
      security:
        - bearerAuth: []
      operationId: createFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FolderCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound' 
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/folders/{id}:
    get:
      tags: [Dossiers]
      summary: Détail dossier (sinistre lié + étapes)
      security:
        - bearerAuth: []
      operationId: getFolderById
      parameters:
        - $ref: '#/components/parameters/FolderId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/folders/{id}/assign:
    patch:
      tags: [Dossiers]
      summary: Assigner un chargé de suivi
      description: |
        Rôles : ADMIN, PORTFOLIO_MANAGER.
        L’utilisateur assigné doit être actif et de rôle TRACKING_OFFICER ou ADMIN.
      security:
        - bearerAuth: []
      operationId: assignFolderOfficer
      parameters:
        - $ref: '#/components/parameters/FolderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FolderAssign'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/folders/{id}/scenario:
    patch:
      tags: [Dossiers]
      summary: Définir le scénario du dossier (première fois)
      description: |
        Réservé lorsque le dossier n’a pas encore de `scenario` (REPAIRABLE ou TOTAL_LOSS).
        Requis avant certaines étapes (ex. rapport d’expertise, facture garage, RIB selon le parcours).

        **Rôles** : ADMIN, PORTFOLIO_MANAGER ; ou TRACKING_OFFICER uniquement si le dossier lui est assigné.

        Si le scénario est déjà renseigné, l’API répond **422** (pas de changement par cette route).
      security:
        - bearerAuth: []
      operationId: updateFolderScenario
      parameters:
        - $ref: '#/components/parameters/FolderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FolderScenarioSet'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/folders/{id}/close:
    patch:
      tags: [Dossiers]
      summary: Clôturer le dossier
      description: |
        Rôles : ADMIN, PORTFOLIO_MANAGER.
        Met `is_closed` à true et `status` à CLOSED.

        **Règles** : si une étape `PAYMENT_SETTLED` existe, délai de **48h** après la dernière avant clôture.
        Responsabilité **100%** sur le sinistre : pas d’étape de refacturation obligatoire.
        **0% ou 50%** : étape `THIRD_PARTY_REBILLING_CONFIRMED` requise.
      security:
        - bearerAuth: []
      operationId: closeFolder
      parameters:
        - $ref: '#/components/parameters/FolderId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderCloseResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/history:
    get:
      tags: [Historisation]
      summary: Historique des mutations pour une entité
      description: |
        Rôles : ADMIN, PORTFOLIO_MANAGER, TRACKING_OFFICER, CUSTOMER_OFFICER.
        Les écritures sont déclenchées automatiquement depuis les services (sinistre, document, dossier, étape, utilisateur).
      security:
        - bearerAuth: []
      operationId: listHistory
      parameters:
        - name: entity_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - sinister
              - document
              - folder
              - folder_step
              - user
        - name: entity_id
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/notifications:
    get:
      tags: [Notifications]
      summary: Mes notifications
      description: |
        Liste paginée des notifications de l’utilisateur JWT (`user_id`).
        Déclencheurs internes : document à valider, étape RIB (suivi), règlement + 48h, types d’étape `EXPERTISE_ECHEANCE` / `GENERIC_ECHEANCE`.
      security:
        - bearerAuth: []
      operationId: listMyNotifications
      parameters:
        - name: is_read
          in: query
          schema: { type: string, enum: ['true', 'false'] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/notifications/mark-all-read:
    post:
      tags: [Notifications]
      summary: Tout marquer comme lu
      description: Passe toutes les notifications **non lues** de l’utilisateur authentifié en `is_read: true`. Retourne le nombre d’enregistrements mis à jour.
      security:
        - bearerAuth: []
      operationId: markAllMyNotificationsRead
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationMarkAllReadResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Marquer une notification comme lue
      security:
        - bearerAuth: []
      operationId: markNotificationRead
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/folders/{id}/steps:
    get:
      tags: [Dossiers]
      summary: Lister les étapes du dossier (ordre chronologique)
      description: |
        Rôles : ADMIN, PORTFOLIO_MANAGER, TRACKING_OFFICER, CUSTOMER_OFFICER.
      security:
        - bearerAuth: []
      operationId: listFolderSteps
      parameters:
        - $ref: '#/components/parameters/FolderId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderStepListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Dossiers]
      summary: Enregistrer une étape (workflow)
      description: |
        Rôles : ADMIN, PORTFOLIO_MANAGER, TRACKING_OFFICER (ce dernier uniquement s’il est `assigned_officer_id` du dossier).

        **Documents** : tout `document_id` doit référencer un document avec `is_validated = true`.

        **Types structurants** (scénario dossier requis) :
        - `S1_EXPERT_REPORT` + scénario `REPAIRABLE` → document type `EXPERT_REPORT`
        - `S1_INVOICE` + `REPAIRABLE` → `INVOICE`
        - `S2_RIB` + `TOTAL_LOSS` → `RIB`

        **Clôture** : enregistrer `PAYMENT_SETTLED` avant clôture pour déclencher le délai de 48h.
        Si responsabilité sinistre 0% ou 50%, une étape `THIRD_PARTY_REBILLING_CONFIRMED` est obligatoire avant clôture (100% : refacturation non exigée).
      security:
        - bearerAuth: []
      operationId: createFolderStep
      parameters:
        - $ref: '#/components/parameters/FolderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FolderStepCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderStepSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    SinisterId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    DocumentId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    FolderId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    UserRole:
      type: string
      enum:
        - ADMIN
        - PORTFOLIO_MANAGER
        - TRACKING_OFFICER
        - CUSTOMER_OFFICER
        - INSURED

    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        email: { type: string, format: email }
        first_name: { type: string, nullable: true }
        last_name: { type: string, nullable: true }
        role:
          $ref: '#/components/schemas/UserRole'
        is_active: { type: boolean }
        password_pending:
          type: boolean
          description: True tant que l’assuré n’a pas défini son mot de passe (compte provisionné par l’entreprise).
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    UserInsuredProvision:
      type: object
      required: [username, email]
      properties:
        username: { type: string, maxLength: 255 }
        email: { type: string, format: email }
        first_name: { type: string, maxLength: 255 }
        last_name: { type: string, maxLength: 255 }
        send_welcome_email:
          type: boolean
          default: false
          description: Si `true`, envoie l’e-mail de premier accès. Sinon, création seule.

    UserCreate:
      type: object
      required: [username, email, password, role]
      properties:
        username: { type: string, maxLength: 255 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        role:
          $ref: '#/components/schemas/UserRole'
        first_name: { type: string }
        last_name: { type: string }
        is_active: { type: boolean }

    UserUpdate:
      type: object
      minProperties: 1
      properties:
        username: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        role:
          $ref: '#/components/schemas/UserRole'
        first_name: { type: string }
        last_name: { type: string }
        is_active: { type: boolean }

    ListMeta:
      type: object
      properties:
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          $ref: '#/components/schemas/ListMeta'

    InsuredOptionsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'

    UserSingleResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'

    UserDeactivateResponse:
      type: object
      properties:
        message: { type: string }
        data:
          $ref: '#/components/schemas/User'

    LoginResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        tokenType: { type: string, example: Bearer }
        expiresIn: { type: integer, description: Durée de vie de l’access token (secondes) }
        user:
          $ref: '#/components/schemas/User'

    TokenPair:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        tokenType: { type: string }
        expiresIn: { type: integer }

    ErrorMessage:
      type: object
      properties:
        message: { type: string }
        code: { type: string }
      required: [message, code]

    ValidationErrorBody:
      type: object
      properties:
        message: { type: string }
        code: { type: string, example: VALIDATION_ERROR }
        errors:
          type: array
          items: { type: object }

    SequelizeValidationBody:
      type: object
      properties:
        message: { type: string }
        code: { type: string }
        details:
          type: array
          items: { type: string }

    DocumentType:
      type: string
      enum:
        - ID_CARD
        - REGISTRATION_CARD
        - INSURANCE_CERT
        - EXPERT_REPORT
        - INVOICE
        - RIB
        - SIGNATURE

    Document:
      type: object
      properties:
        id: { type: integer }
        type:
          $ref: '#/components/schemas/DocumentType'
        storage_url: { type: string, nullable: true, description: Chemin relatif côté serveur }
        is_validated: { type: boolean }
        uploaded_at: { type: string, format: date-time, nullable: true }
        uploaded_by_id: { type: integer, nullable: true, description: Auteur de l’upload (pièces assuré, etc.) }

    DocumentMeta:
      type: object
      properties:
        id: { type: integer }
        type:
          $ref: '#/components/schemas/DocumentType'
        is_validated: { type: boolean }
        uploaded_at: { type: string, format: date-time, nullable: true }
        storage_url:
          type: string
          description: URL publique (GET ce même document)

    DocumentUploadResponse:
      type: object
      properties:
        data:
          type: object
          required: [id, storage_url]
          properties:
            id: { type: integer }
            type:
              $ref: '#/components/schemas/DocumentType'
            storage_url:
              type: string
              description: URL pour télécharger le document (GET /api/documents/{id})

    DocumentValidateResponse:
      type: object
      properties:
        message: { type: string }
        data:
          $ref: '#/components/schemas/Document'

    DocumentSignRequest:
      type: object
      required: [first_name, last_name, email]
      properties:
        first_name:
          type: string
          maxLength: 255
        last_name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        locale:
          type: string
          maxLength: 8
          description: Code locale signataire (défaut `fr`)
        sign_page:
          type: integer
          minimum: 1
          description: Numéro de page du champ de signature (défaut 1)
        sign_x:
          type: integer
          minimum: 0
          description: Abscisse du champ (défaut côté serveur)
        sign_y:
          type: integer
          minimum: 0
          description: Ordonnée du champ (défaut côté serveur)
        signature_request_name:
          type: string
          maxLength: 255
          description: Libellé de la demande dans Yousign

    DocumentSignResponse:
      type: object
      properties:
        data:
          type: object
          required:
            - document_id
            - signature_request_id
            - yousign_document_id
          properties:
            document_id: { type: integer }
            signature_request_id: { type: string }
            yousign_document_id: { type: string }
            status: { type: string, nullable: true }
            signature_link:
              type: string
              nullable: true
              description: Lien de signature du premier signataire si fourni par Yousign
            signers:
              type: array
              items: { type: object, additionalProperties: true }
              description: Liste des signataires telle que renvoyée par Yousign après activation

    FolderStatus:
      type: string
      enum:
        - INITIALIZED
        - EXPERTISE_PENDING
        - REPAIR_PLANNED
        - COMPENSATION_PENDING
        - CLOSED

    FolderScenario:
      type: string
      enum: [REPAIRABLE, TOTAL_LOSS]

    SinisterListStatusFilter:
      type: string
      description: |
        `pending_validation` ou `validated`, ou un statut de dossier (`INITIALIZED`, …).
      enum:
        - pending_validation
        - validated
        - INITIALIZED
        - EXPERTISE_PENDING
        - REPAIR_PLANNED
        - COMPENSATION_PENDING
        - CLOSED

    SinisterFolderSummary:
      type: object
      nullable: true
      properties:
        id: { type: integer }
        folder_reference: { type: string, nullable: true }
        status:
          $ref: '#/components/schemas/FolderStatus'
        scenario:
          $ref: '#/components/schemas/FolderScenario'
        is_closed: { type: boolean }
        created_at: { type: string, format: date-time, nullable: true }

    SinisterFolderDetail:
      allOf:
        - $ref: '#/components/schemas/SinisterFolderSummary'
        - type: object
          properties:
            updated_at: { type: string, format: date-time, nullable: true }
            assigned_officer_id: { type: integer, nullable: true }
            assignedOfficer:
              $ref: '#/components/schemas/User'
              nullable: true
              description: Présent si chargé avec l’association

    Sinister:
      type: object
      properties:
        id: { type: integer }
        vehicle_plate: { type: string }
        driver_first_name: { type: string, nullable: true }
        driver_last_name: { type: string, nullable: true }
        is_driver_insured: { type: boolean }
        call_datetime: { type: string, format: date-time }
        incident_datetime: { type: string, format: date-time }
        description: { type: string, nullable: true }
        driver_responsability: { type: boolean }
        driver_engaged_responsibility: { type: integer, nullable: true, enum: [0, 50, 100] }
        cni_driver: { type: integer, nullable: true }
        vehicle_registration_doc_id: { type: integer, nullable: true }
        insurance_certificate_id: { type: integer, nullable: true }
        is_validated_by_manager: { type: boolean }
        created_by_id: { type: integer, nullable: true }
        insured_user_id: { type: integer, nullable: true, description: Compte assuré rattaché (consultation & dépôts) }
        created_at: { type: string, format: date-time, nullable: true }
        status:
          type: string
          description: |
            Calculé : `pending_validation`, `validated`, ou `FOLDER_<statut dossier>` si un dossier existe.
        folder:
          $ref: '#/components/schemas/SinisterFolderSummary'

    SinisterDetail:
      allOf:
        - $ref: '#/components/schemas/Sinister'
        - type: object
          properties:
            creator:
              $ref: '#/components/schemas/User'
              nullable: true
            cniDocument:
              $ref: '#/components/schemas/Document'
              nullable: true
            registrationDocument:
              $ref: '#/components/schemas/Document'
              nullable: true
            insuranceDocument:
              $ref: '#/components/schemas/Document'
              nullable: true
            folder:
              $ref: '#/components/schemas/SinisterFolderDetail'
              nullable: true
            insuredUser:
              $ref: '#/components/schemas/User'
              nullable: true
              description: Assuré rattaché (si renseigné en création / mise à jour)

    SinisterCreate:
      type: object
      required: [vehicle_plate, call_datetime, incident_datetime]
      properties:
        vehicle_plate: { type: string, maxLength: 50 }
        driver_first_name: { type: string, maxLength: 255 }
        driver_last_name: { type: string, maxLength: 255 }
        is_driver_insured: { type: boolean }
        call_datetime: { type: string, format: date-time }
        incident_datetime: { type: string, format: date-time }
        description: { type: string }
        driver_responsability: { type: boolean }
        driver_engaged_responsibility: { type: integer, enum: [0, 50, 100] }
        cni_driver: { type: integer, minimum: 1, description: ID document type ID_CARD }
        vehicle_registration_doc_id:
          { type: integer, minimum: 1, description: ID document type REGISTRATION_CARD }
        insurance_certificate_id:
          { type: integer, minimum: 1, description: ID document type INSURANCE_CERT }
        insured_user_id:
          { type: integer, minimum: 1, description: ID utilisateur de rôle INSURED à associer }

    SinisterUpdate:
      type: object
      minProperties: 1
      properties:
        vehicle_plate: { type: string, maxLength: 50 }
        driver_first_name: { type: string, maxLength: 255 }
        driver_last_name: { type: string, maxLength: 255 }
        is_driver_insured: { type: boolean }
        call_datetime: { type: string, format: date-time }
        incident_datetime: { type: string, format: date-time }
        description: { type: string }
        driver_responsability: { type: boolean }
        driver_engaged_responsibility: { type: integer, enum: [0, 50, 100] }
        cni_driver: { type: integer, minimum: 1 }
        vehicle_registration_doc_id: { type: integer, minimum: 1 }
        insurance_certificate_id: { type: integer, minimum: 1 }
        insured_user_id: { type: integer, minimum: 1, nullable: true, description: Réassigner l’assuré }

    SinisterListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Sinister'
        meta:
          $ref: '#/components/schemas/ListMeta'

    SinisterSingleResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SinisterDetail'

    SinisterValidateMeta:
      type: object
      properties:
        folder_created: { type: boolean, description: Dossier sinister_folders créé lors de cet appel }
        folder_id: { type: integer, nullable: true }
        dossier_complet: { type: boolean, description: Sinistre prêt pour génération dossier }

    SinisterValidateResponse:
      type: object
      properties:
        message: { type: string }
        data:
          $ref: '#/components/schemas/SinisterDetail'
        meta:
          $ref: '#/components/schemas/SinisterValidateMeta'

    FolderStep:
      type: object
      properties:
        id: { type: integer }
        folder_id: { type: integer }
        step_type: { type: string, nullable: true }
        value: { type: string, nullable: true }
        action_date: { type: string, format: date-time }
        document_id: { type: integer, nullable: true }
        performed_by_id: { type: integer, nullable: true }
        document:
          $ref: '#/components/schemas/Document'
          nullable: true
        performedBy:
          $ref: '#/components/schemas/User'
          nullable: true

    ClaimFolder:
      type: object
      description: Dossier (table sinister_folders)
      properties:
        id: { type: integer }
        sinister_id: { type: integer }
        folder_reference: { type: string, nullable: true }
        status:
          $ref: '#/components/schemas/FolderStatus'
        scenario:
          $ref: '#/components/schemas/FolderScenario'
          nullable: true
        is_closed: { type: boolean }
        assigned_officer_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
        sinister:
          $ref: '#/components/schemas/Sinister'
          nullable: true
        assignedOfficer:
          $ref: '#/components/schemas/User'
          nullable: true
        steps:
          type: array
          items:
            $ref: '#/components/schemas/FolderStep'

    FolderCreate:
      type: object
      required: [sinister_id]
      properties:
        sinister_id: { type: integer, minimum: 1 }
        force:
          type: boolean
          description: ADMIN / PORTFOLIO_MANAGER uniquement — crée le dossier sans exiger la complétude des pièces
        scenario:
          $ref: '#/components/schemas/FolderScenario'
          description: Optionnel — fixe le scénario pour les étapes S1 / S2

    FolderStepCreate:
      type: object
      required: [step_type]
      properties:
        step_type:
          type: string
          maxLength: 255
          description: |
            Ex. `S1_EXPERT_REPORT`, `S1_INVOICE`, `S2_RIB`, `PAYMENT_SETTLED`, `THIRD_PARTY_REBILLING_CONFIRMED`, ou libre.
        value: { type: string, nullable: true, description: Donnée libre (JSON texte, date, etc.) }
        document_id: { type: integer, minimum: 1, nullable: true }
        performed_by_id: { type: integer, minimum: 1, nullable: true, description: Réservé ADMIN si différent du JWT }

    FolderStepListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FolderStep'

    FolderStepSingleResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/FolderStep'

    FolderAssign:
      type: object
      required: [assigned_officer_id]
      properties:
        assigned_officer_id: { type: integer, minimum: 1 }

    FolderScenarioSet:
      type: object
      required: [scenario]
      properties:
        scenario:
          type: string
          enum: [REPAIRABLE, TOTAL_LOSS]
          description: Véhicule réparable vs perte totale / indemnisation

    FolderListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ClaimFolder'
        meta:
          $ref: '#/components/schemas/ListMeta'

    FolderSingleResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ClaimFolder'

    FolderCloseResponse:
      type: object
      properties:
        message: { type: string }
        data:
          $ref: '#/components/schemas/ClaimFolder'

    HistoryLogEntry:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer, nullable: true }
        entity_type: { type: string }
        entity_id: { type: integer }
        action: { type: string, description: Ex. sinister.created, folder_step.created:S1_EXPERT_REPORT }
        created_at: { type: string, format: date-time }
        actor:
          $ref: '#/components/schemas/User'
          nullable: true

    HistoryListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/HistoryLogEntry'

    NotificationChannel:
      type: string
      enum: [EMAIL, PUSH]

    Notification:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        content: { type: string, nullable: true }
        channel:
          $ref: '#/components/schemas/NotificationChannel'
        is_read: { type: boolean }
        created_at: { type: string, format: date-time }

    NotificationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        meta:
          $ref: '#/components/schemas/ListMeta'

    NotificationSingleResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Notification'

    NotificationMarkAllReadResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            updated: { type: integer, minimum: 0, description: Nombre de lignes passées en lues }
          required: [updated]

  responses:
    ValidationError:
      description: Paramètres ou corps invalides
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ValidationErrorBody'
              - $ref: '#/components/schemas/SequelizeValidationBody'

    NotFound:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'

    InternalError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'

    Unauthorized:
      description: Non authentifié
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'

    Forbidden:
      description: Droits insuffisants
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'

    UnprocessableEntity:
      description: Règle métier (ex. sinistre déjà validé, mise à jour interdite)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
